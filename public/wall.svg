<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Canvas Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </radialGradient>
    
    <!-- Clean White/Silver AC Glossy Body Gradient -->
    <linearGradient id="wallAcBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="10%" stop-color="#F8FAFC" />
      <stop offset="85%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>

    <!-- Lower Louver/Flap Highlight -->
    <linearGradient id="flapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="50%" stop-color="#E2E8F0" />
      <stop offset="100%" stop-color="#64748B" />
    </linearGradient>

    <!-- Gloss Highlight Overlay -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <!-- Digital Display Blue Glow -->
    <filter id="iceBlueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Drop Shadow for Wall Unit -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#020617" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />

  <!-- Subtle grid visual helper -->
  <g opacity="0.1">
    <path d="M 0,100 L 400,100 M 0,200 L 400,200 M 0,300 L 400,300" stroke="#475569" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400" stroke="#475569" stroke-width="1" />
  </g>

  <!-- Soft cooling flow wind vector graphics -->
  <g opacity="0.8">
    <!-- Curved flow lines streaming downward -->
    <path d="M 160,225 Q 140,290 100,320 T 60,360" fill="none" stroke="#60A5FA" stroke-width="3.5" stroke-linecap="round" opacity="0.4" />
    <path d="M 200,225 Q 200,300 170,340 T 140,380" fill="none" stroke="#2563EB" stroke-width="4.5" stroke-linecap="round" opacity="0.5" />
    <path d="M 240,225 Q 260,290 300,320 T 340,360" fill="none" stroke="#60A5FA" stroke-width="3.5" stroke-linecap="round" opacity="0.4" />
  </g>

  <!-- WALL MOUNTED AC UNIT SHADOW AND CASE -->
  <g filter="url(#dropShadow)">
    
    <!-- Outer Curved Beveled Chassis -->
    <rect x="50" y="110" width="300" height="100" rx="14" fill="url(#wallAcBody)" />
    
    <!-- Top Intake Vent Area Grill Rim -->
    <rect x="65" y="115" width="270" height="12" rx="4" fill="#64748B" opacity="0.15" />
    <!-- Fine Horizontal intake lines -->
    <path d="M 70,118 L 330,118 M 70,121 L 330,121 M 70,124 L 330,124" stroke="#94A3B8" stroke-width="1" />

    <!-- Sleek Front Panel Seam Line -->
    <path d="M 50,185 C 100,186 300,186 350,185" stroke="#CBD5E1" stroke-width="1.5" />

    <!-- Soft Horizontal Silver Accent Stripe -->
    <rect x="50" y="150" width="300" height="4" fill="#94A3B8" opacity="0.4" />

    <!-- Lower Flap / Air Outlet Louver (Slightly open to blow air) -->
    <rect x="62" y="194" width="276" height="11" rx="2.5" fill="url(#flapGrad)" />
    <!-- Center Guide Indicator -->
    <rect x="194" y="194" width="12" height="11" fill="#475569" opacity="0.3" />

    <!-- Gloss sheen reflection effect -->
    <path d="M 50,124 L 200,124 L 140,210 L 50,210 Z" fill="url(#glossGrad)" clip-path="url(#acClip)" />

    <!-- Cool Temp LED Hidden Panel (appears glowing through the white plastic) -->
    <rect x="280" y="142" width="45" height="24" rx="4" fill="#0F172A" />
    <text x="296" y="159" fill="#38BDF8" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="900" filter="url(#iceBlueGlow)">18</text>
    <!-- Degree cell symbol -->
    <circle cx="314" cy="149" r="2" fill="none" stroke="#38BDF8" stroke-width="1.5" filter="url(#iceBlueGlow)" />

    <!-- Running status indicators (Green / Blue tiny LEDs) -->
    <circle cx="266" cy="148" r="1.5" fill="#10B981" filter="url(#iceBlueGlow)" />
    <circle cx="266" cy="156" r="1.5" fill="#3B82F6" opacity="0.8" />

    <!-- Beautiful Chrome Carrier Logo Center -->
    <rect x="180" y="162" width="40" height="9" rx="1.5" fill="#002D62" />
    <text x="200" y="169" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">CARRIER</text>
  </g>
</svg>

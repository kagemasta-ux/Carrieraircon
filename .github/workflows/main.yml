name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main # 배포할 브랜치명 (필요시 master 등으로 변경)

permissions:
  contents: read
  id-token: write # 구글 임시 인증 토큰을 발급받기 위해 필수적인 권한

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🔑 서비스 계정 키 파일 없이 구글 클라우드에 안전하게 로그인하는 단계
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # 아래 주소는 구글 클라우드 보안 시스템에 맞춰 GitHub과 연동하는 표준 통로 주소 포맷입니다.
          workload_identity_provider: 'projects/carrier-498123/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'service_account: 'github-action-1256660290@carrier-498123.iam.gserviceaccount.com'

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build # 본인의 프론트엔드 프로젝트 빌드 명령어

      # 🚀 Firebase Hosting 배포 실행
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          projectId: carrier-498123

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </radialGradient>
    
    <!-- Metallic Body Gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D1D5DB" />
      <stop offset="15%" stop-color="#E5E7EB" />
      <stop offset="50%" stop-color="#F3F4F6" />
      <stop offset="85%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>

    <!-- Metallic Highlight Gradient -->
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9CA3AF" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#4B5563" />
    </linearGradient>

    <!-- Vent / Grill Shading -->
    <linearGradient id="grillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="50%" stop-color="#374151" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- LED Glow -->
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Drop Shadow for the AC Unit -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16" />

  <!-- Subtle grid lines to feel like a modern preview -->
  <g opacity="0.1">
    <path d="M 0,100 L 400,100 M 0,200 L 400,200 M 0,300 L 400,300" stroke="#475569" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400" stroke="#475569" stroke-width="1" />
  </g>

  <!-- Cooling Air Breeze (Dynamic wavy curves) -->
  <g opacity="0.75">
    <path d="M 125,120 Q 90,140 100,170 T 70,220" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M 125,160 Q 80,195 90,230 T 55,290" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    
    <path d="M 275,120 Q 310,140 300,170 T 330,220" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M 275,160 Q 320,195 310,230 T 345,290" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Base Shadow on floor -->
  <ellipse cx="200" cy="365" rx="70" ry="10" fill="#020617" opacity="0.2" filter="blur(4px)" />

  <!-- MAIN FLOOR STANDING TOWER UNIT -->
  <g filter="url(#dropShadow)">
    
    <!-- Outer Premium Silhouette Case -->
    <rect x="140" y="50" width="120" height="310" rx="12" fill="url(#bodyGrad)" />
    
    <!-- Dark Glossy Control/Vent Stripe down the center -->
    <rect x="188" y="55" width="24" height="290" rx="3" fill="url(#grillGrad)" />
    
    <!-- Side Wind Vents Accent Lines -->
    <path d="M 148,80 L 148,300 M 252,80 L 252,300" stroke="#9CA3AF" stroke-width="1" stroke-linecap="round" />
    
    <!-- Detailed Micro horizontal air vent lines (grill) -->
    <g stroke="#1F2937" stroke-width="1.5" opacity="0.85">
      <!-- Top Intake Grill -->
      <line x1="148" y1="80" x2="182" y2="80" />
      <line x1="148" y1="90" x2="182" y2="90" />
      <line x1="148" y1="100" x2="182" y2="100" />
      <line x1="148" y1="110" x2="182" y2="110" />
      <line x1="148" y1="120" x2="182" y2="120" />

      <line x1="218" y1="80" x2="252" y2="80" />
      <line x1="218" y1="90" x2="252" y2="90" />
      <line x1="218" y1="100" x2="252" y2="100" />
      <line x1="218" y1="110" x2="252" y2="110" />
      <line x1="218" y1="120" x2="252" y2="120" />
      
      <!-- Middle / Lower Elegant Vent patterns -->
      <line x1="148" y1="200" x2="182" y2="200" />
      <line x1="148" y1="210" x2="182" y2="210" />
      <line x1="148" y1="220" x2="182" y2="220" />

      <line x1="218" y1="200" x2="252" y2="200" />
      <line x1="218" y1="210" x2="252" y2="210" />
      <line x1="218" y1="220" x2="252" y2="220" />
    </g>

    <!-- Digital Glass Controller Panel (Top portion of the center stripe) -->
    <rect x="189" y="80" width="22" height="60" rx="2" fill="#030712" />
    
    <!-- LED Temperature Glow Info (Carrier 18단) -->
    <text x="200" y="105" fill="#38BDF8" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold" text-anchor="middle" filter="url(#blueGlow)">18℃</text>
    <circle cx="200" cy="120" r="2.5" fill="#10B981" filter="url(#blueGlow)" />
    <circle cx="200" cy="130" r="2" fill="#3B82F6" opacity="0.8" />

    <!-- Chrome Airflow Louver Panels -->
    <rect x="144" y="140" width="40" height="20" rx="2" fill="url(#metalHighlight)" opacity="0.9" />
    <path d="M 148,150 L 180,150" stroke="#374151" stroke-width="1.5" />
    
    <rect x="216" y="140" width="40" height="20" rx="2" fill="url(#metalHighlight)" opacity="0.9" />
    <path d="M 220,150 L 252,150" stroke="#374151" stroke-width="1.5" />

    <!-- Chrome Base Plate Accent -->
    <rect x="138" y="345" width="124" height="15" rx="4" fill="url(#metalHighlight)" />

    <!-- Carrier Signature Elegant Brand Badge -->
    <rect x="185" y="325" width="30" height="8" rx="1" fill="#002D62" />
    <text x="200" y="331" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="4" font-weight="900" text-anchor="middle" letter-spacing="0.5">CARRIER</text>
  </g>
</svg>
